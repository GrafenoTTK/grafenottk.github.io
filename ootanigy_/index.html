<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gyovanna Otani | @ootanigy_</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0a0e;
      font-family: 'Lato', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(180, 80, 120, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(120, 40, 80, 0.22) 0%, transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes bgPulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }

    .petal {
      position: fixed;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: fall linear infinite;
      z-index: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ===== IPHONE SHELL ===== */
    .iphone-wrap {
      position: relative;
      z-index: 1;
      animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(50px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .iphone {
      position: relative;
      width: 320px;
      height: 660px;
      background: linear-gradient(160deg, #1a1a1e 0%, #111115 100%);
      border-radius: 52px;
      border: 1.5px solid rgba(255,255,255,0.13);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.8),
        0 30px 80px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(255,255,255,0.04),
        2px 0 8px rgba(0,0,0,0.4),
        -2px 0 8px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    /* Side buttons */
    .btn-side {
      position: absolute;
      background: linear-gradient(180deg, #2a2a2e, #1a1a1e);
      border-radius: 3px;
    }
    .btn-power {
      right: -3px; top: 140px;
      width: 3px; height: 68px;
      box-shadow: inset -1px 0 2px rgba(255,255,255,0.05);
    }
    .btn-vol1 {
      left: -3px; top: 120px;
      width: 3px; height: 40px;
    }
    .btn-vol2 {
      left: -3px; top: 172px;
      width: 3px; height: 40px;
    }
    .btn-silent {
      left: -3px; top: 80px;
      width: 3px; height: 28px;
      border-radius: 3px 3px 3px 3px;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 32px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    /* Screen */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 50px;
      overflow-y: auto;
      overflow-x: hidden;
      background: #0d0a0e;
      scrollbar-width: none;
    }
    .screen::-webkit-scrollbar { display: none; }

    /* Cover photo */
    .cover {
      position: relative;
      width: 100%;
      height: 230px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .cover::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100px;
      background: linear-gradient(to bottom, transparent, #0d0a0e);
    }

    /* Avatar */
    .avatar-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -44px;
      position: relative;
      z-index: 2;
    }
    .avatar-ring {
      width: 84px; height: 84px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(from 0deg, #c06090, #8a2252, #e08aaa, #c06090);
      animation: spin 6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-ring-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #0d0a0e;
      padding: 3px;
    }
    .avatar-img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Bio content */
    .bio-content {
      padding: 14px 22px 36px;
      text-align: center;
    }
    .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: #f0d0de;
      letter-spacing: 0.02em;
      margin-bottom: 2px;
    }
    .handle {
      font-size: 0.72rem;
      color: #b06888;
      letter-spacing: 0.12em;
      margin-bottom: 14px;
    }
    .divider {
      width: 36px; height: 1px;
      background: linear-gradient(90deg, transparent, #c06090, transparent);
      margin: 0 auto 14px;
    }
    .bio {
      font-size: 0.8rem;
      color: #c8a0b8;
      line-height: 1.85;
      margin-bottom: 22px;
      font-weight: 300;
    }
    .bio em {
      color: #e8b8cc;
      font-style: italic;
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
    }
    .bio a {
      color: #d080a8;
      text-decoration: none;
    }

    /* Button */
    .btn {
      display: inline-block;
      position: relative;
      padding: 11px 24px;
      border-radius: 50px;
      background: linear-gradient(135deg, #b04070, #7a1848);
      color: #fce8f0;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid rgba(220,120,170,0.3);
      box-shadow: 0 4px 18px rgba(180,60,110,0.4);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      overflow: visible;
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 26px rgba(180,60,110,0.55);
    }
    .btn.clicked {
      animation: btnPop 0.45s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes btnPop {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.91); }
      60%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .footer-stars {
      margin-top: 22px;
      font-size: 0.6rem;
      color: rgba(180,100,140,0.3);
      letter-spacing: 0.3em;
    }

    /* Hearts burst */
    .hearts-burst {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9999;
    }
    .hearts-burst.active { display: block; }
    .heart-particle {
      position: absolute;
      font-size: 1.3rem;
      animation: burstFly 1s ease-out forwards;
    }
    @keyframes burstFly {
      0%   { transform: translate(0,0) scale(1.2); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; }
    }

    /* Home bar */
    .home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      z-index: 10;
    }
  </style>
</head>
<body>

<script>
  const colors = ['#c06090','#e08aaa','#a04070','#f0b8d0','#803060'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 4 + Math.random()*7;
    p.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${size}px;height:${size}px;animation-duration:${5+Math.random()*8}s;animation-delay:${Math.random()*8}s;`;
    document.body.appendChild(p);
  }
</script>

<div class="iphone-wrap">
  <!-- Side buttons -->
  <div class="btn-side btn-power"></div>
  <div class="btn-side btn-silent"></div>
  <div class="btn-side btn-vol1"></div>
  <div class="btn-side btn-vol2"></div>

  <div class="iphone">
    <div class="dynamic-island"></div>
    <div class="home-bar"></div>

    <div class="screen">
      <!-- Cover photo -->
      <div class="cover">
        <img src="https://i.imgur.com/u8AWNAX.png" alt="Gyovanna Otani" />
      </div>

      <!-- Avatar -->
      <div class="avatar-area">
        <div class="avatar-ring">
          <div class="avatar-ring-inner">
            <img class="avatar-img" src="https://i.imgur.com/u8AWNAX.png" alt="Gyovanna" />
          </div>
        </div>
      </div>

      <!-- Bio -->
      <div class="bio-content">
        <div class="name">Gyovanna Otani</div>
        <div class="handle">@ootanigy_</div>
        <div class="divider"></div>
        <div class="bio">
          <em>life is of moments</em><br><br>
          • Capricorniana ♑<br>
          • 💍 R<br>
          • <a href="https://www.instagram.com/santosfc/" target="_blank">@santosfc</a> 🤍🖤
        </div>

        <a class="btn" id="igBtn" href="https://www.instagram.com/ootanigy_/" target="_blank">
          ✦ Siga-me no Instagram ✦
        </a>

        <div class="footer-stars">✦ &nbsp; ✦ &nbsp; ✦</div>
      </div>
    </div>
  </div>
</div>

<div class="hearts-burst" id="heartsBurst"></div>

<script>
  const btn = document.getElementById('igBtn');
  const burst = document.getElementById('heartsBurst');
  const emojis = ['🌸','💕','✨','🩷','💗','🌷','💖','🫧'];

  btn.addEventListener('click', function() {
    btn.classList.remove('clicked');
    void btn.offsetWidth;
    btn.classList.add('clicked');

    burst.innerHTML = '';
    burst.classList.add('active');
    for (let i = 0; i < 14; i++) {
      const span = document.createElement('span');
      span.className = 'heart-particle';
      span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      const angle = (i / 14) * 360;
      const dist = 70 + Math.random() * 60;
      const rad = angle * Math.PI / 180;
      span.style.setProperty('--tx', Math.cos(rad)*dist + 'px');
      span.style.setProperty('--ty', Math.sin(rad)*dist + 'px');
      span.style.animationDelay = (Math.random()*0.2)+'s';
      burst.appendChild(span);
    }
    setTimeout(() => { burst.classList.remove('active'); burst.innerHTML = ''; }, 1200);
  });
</script>
</body>
</html>
