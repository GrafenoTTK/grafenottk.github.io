<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Gyovanna Otani | _gyoinday</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0d0a0e;
      --rose1:#c06090;
      --rose2:#8a2252;
      --rose3:#e08aaa;
      --btn-from:#b04070;
      --btn-to:#7a1848;
      --text-name:#f0d0de;
      --text-handle:#b06888;
      --text-quote:#e8b8cc;
      --tag-text:#e0a8c0;
      --tag-bg:rgba(180,60,110,0.13);
      --tag-border:rgba(200,100,150,0.25);
      --frame:#1a1a1e;
      --sw:320px;
      --sh:660px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:"Lato",sans-serif;overflow-x:hidden;padding:20px 0;}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(180,80,120,.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(120,40,80,.22) 0%,transparent 60%);animation:bgPulse 8s ease-in-out infinite alternate;z-index:0;}
    @keyframes bgPulse{0%{opacity:.7}100%{opacity:1}}
    .petal{position:fixed;border-radius:50% 0 50% 0;opacity:0;animation:fall linear infinite;z-index:0;}
    @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:.6}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    .iphone-wrap{position:relative;z-index:1;animation:cardIn .9s cubic-bezier(.22,1,.36,1) both;}
    @keyframes cardIn{from{opacity:0;transform:translateY(50px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* PHONE */
    .iphone{
      position:relative;width:var(--sw);height:var(--sh);
      background:linear-gradient(160deg,var(--frame) 0%,#0a0a0c 100%);
      border-radius:52px;
      border:1.5px solid rgba(255,255,255,.13);
      box-shadow:0 0 0 1px rgba(0,0,0,.8),0 30px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.08);
      overflow:hidden;
    }
    .btn-side{position:absolute;background:rgba(255,255,255,.08);border-radius:3px;}
    .btn-power{right:-3px;top:140px;width:3px;height:68px;}
    .btn-vol1{left:-3px;top:120px;width:3px;height:40px;}
    .btn-vol2{left:-3px;top:172px;width:3px;height:40px;}
    .btn-silent{left:-3px;top:80px;width:3px;height:28px;}
    
    .notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:110px;height:32px;background:#000;border-radius:20px;z-index:10;}
    
    .home-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:100px;height:4px;background:rgba(255,255,255,.25);border-radius:3px;z-index:10;}

    .screen{position:absolute;inset:0;border-radius:inherit;overflow-y:auto;overflow-x:hidden;background:var(--bg);scrollbar-width:none;}
    .screen::-webkit-scrollbar{display:none;}

    /* COVER */
    .cover{position:relative;width:100%;height:220px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--rose2),var(--bg));}
    .cover img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
    .cover::after{content:"";position:absolute;bottom:0;left:0;right:0;height:110px;background:linear-gradient(to bottom,transparent,var(--bg));}

    /* AVATAR */
    .avatar-area{display:flex;flex-direction:column;align-items:center;margin-top:-44px;position:relative;z-index:2;}
    .avatar-ring{width:84px;height:84px;border-radius:50%;padding:3px;background:conic-gradient(from 0deg,var(--rose1),var(--rose2),var(--rose3),var(--rose1));}
    
    .avatar-ring{animation:pulseRing 2s ease-in-out infinite;}
    @keyframes pulseRing{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    
    .avatar-ring-inner{width:100%;height:100%;border-radius:50%;background:var(--bg);padding:3px;}
    .avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:center top;display:block;background:var(--bg);}

    /* BIO */
    .bio-content{padding:12px 16px 40px;text-align:center;}
    .name{font-family:"Playfair Display",serif;font-size:1.2rem;color:var(--text-name);letter-spacing:.02em;margin-bottom:2px;}
    .handle{font-size:.72rem;color:var(--text-handle);letter-spacing:.12em;margin-bottom:12px;}
    .divider{width:36px;height:1px;background:linear-gradient(90deg,transparent,var(--rose1),transparent);margin:0 auto 14px;}
    .bio-quote{font-family:"Playfair Display",serif;font-style:italic;font-size:.86rem;color:var(--text-quote);margin-bottom:14px;line-height:1.5;}

    /* TAGS */
    .tags-row{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:18px;}
    .tag{display:inline-flex;align-items:center;gap:4px;background:var(--tag-bg);border:1px solid var(--tag-border);border-radius:50px;padding:5px 11px;font-size:.7rem;color:var(--tag-text);letter-spacing:.04em;white-space:nowrap;backdrop-filter:blur(6px);transition:transform .2s,filter .2s;}
    .tag:hover{transform:translateY(-2px) scale(1.04);filter:brightness(1.2);}
    .tag a{color:var(--tag-text);text-decoration:none;}
    .tag a:hover{text-decoration:underline;}

    /* BUTTONS */
    .buttons-list{display:flex;flex-direction:column;gap:9px;margin-bottom:8px;}
    .bio-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;padding:11px 18px;border-radius:50px;
      font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
      text-decoration:none;cursor:pointer;border:none;
      transition:transform .18s,box-shadow .18s,opacity .18s;
      font-family:"Lato",sans-serif;
    }
    .bio-btn.primary{
      background:linear-gradient(135deg,var(--btn-from),var(--btn-to));
      color:#fce8f0;
      border:1px solid rgba(220,120,170,.3);
      box-shadow:0 4px 16px rgba(180,60,110,.35);
    }
    .bio-btn.outline{
      background:transparent;
      color:var(--tag-text);
      border:1px solid var(--tag-border);
    }
    .bio-btn.dark{
      background:rgba(255,255,255,.06);
      color:var(--text-name);
      border:1px solid rgba(255,255,255,.1);
    }
    .bio-btn:hover{transform:translateY(-2px);opacity:.9;}
    .bio-btn:hover.primary{box-shadow:0 8px 24px rgba(180,60,110,.5);}
    .bio-btn.clicked{animation:btnPop .4s cubic-bezier(.36,.07,.19,.97) both;}
    @keyframes btnPop{0%{transform:scale(1)}30%{transform:scale(.92)}60%{transform:scale(1.07)}100%{transform:scale(1)}}

    .footer-stars{margin-top:18px;font-size:.6rem;color:rgba(180,100,140,.3);letter-spacing:.3em;}

    /* LOADING */
    .loading-overlay{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,10,14,.96);backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity .3s;}
    .loading-overlay.show{opacity:1;pointer-events:all;}
    .loader-emoji{font-size:2rem;margin-bottom:14px;animation:loaderSpin 2s linear infinite;}
    @keyframes loaderSpin{to{transform:rotate(360deg)}}
    .loader-label{font-family:"Playfair Display",serif;font-size:.85rem;color:var(--rose1);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px;animation:plsTxt 1.2s ease-in-out infinite;}
    @keyframes plsTxt{0%,100%{opacity:.5}50%{opacity:1}}
    .loader-dots{display:flex;gap:7px;}
    .loader-dot{width:7px;height:7px;border-radius:50%;background:var(--rose1);animation:dotB 1.2s ease-in-out infinite;}
    .loader-dot:nth-child(2){animation-delay:.2s;background:var(--rose3);}
    .loader-dot:nth-child(3){animation-delay:.4s;background:var(--rose2);}
    @keyframes dotB{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-8px);opacity:1}}
    .loader-sub{margin-top:14px;font-size:1rem;letter-spacing:.3em;}
  </style>
</head>
<body>


<script>
const pc=["#c06090", "#e08aaa", "#a04070", "#f0b8d0", "#803060"];
for(let i=0;i<18;i++){
  const p=document.createElement("div");p.className="petal";
  const s=4+Math.random()*7;
  p.style.cssText=`left:${Math.random()*100}vw;background:${pc[Math.floor(Math.random()*pc.length)]};width:${s}px;height:${s}px;animation-duration:${5+Math.random()*8}s;animation-delay:${Math.random()*8}s;`;
  document.body.appendChild(p);
}
</script>



<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-emoji">🌸</div>
  <div class="loader-label">Redirecionando</div>
  <div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
  <div class="loader-sub">💄 ✨ 💅</div>
</div>


<div class="iphone-wrap">
  <div class="btn-side btn-power"></div>
  <div class="btn-side btn-silent"></div>
  <div class="btn-side btn-vol1"></div>
  <div class="btn-side btn-vol2"></div>
  <div class="iphone">
    <div class="notch"></div>
    <div class="home-bar"></div>
    <div class="screen">

      <!-- COVER -->
      <div class="cover">
        
        <img
          src="https://i.imgur.com/u8AWNAX.png"
          alt="capa"
          referrerpolicy="no-referrer"
          crossorigin="anonymous"
          onerror="this.remove()"
        />
        
      </div>

      <!-- AVATAR -->
      <div class="avatar-area">
        <div class="avatar-ring">
          <div class="avatar-ring-inner">
            
            <img
              class="avatar-img"
              src="https://i.imgur.com/u8AWNAX.png"
              alt="Gyovanna Otani"
              referrerpolicy="no-referrer"
              crossorigin="anonymous"
              onerror="this.style.display='none'"
            />
            
          </div>
        </div>
      </div>

      <!-- BIO -->
      <div class="bio-content">
        <div class="name">Gyovanna Otani</div>
        <div class="handle">_gyoinday</div>
        <div class="divider"></div>
        <div class="bio-quote">""</div>

        <div class="tags-row">
          
          <span class="tag">
            <span> 💋</span>
            •maquiagem
          </span>
          
          <span class="tag">
            <span>✨</span>
            •rotina
          </span>
          
          <span class="tag">
            <span>🎀</span>
            •cabelo
          </span>
          
        </div>

        <div class="buttons-list">
          
          <a class="bio-btn primary" data-url="https://www.instagram.com/_gyoinday/" onclick="handleBtn(this)">
            <span>📸</span>
            Siga-me no Instagram
          </a>
          
        </div>

        <div class="footer-stars">✦ &nbsp; ✦ &nbsp; ✦</div>
      </div>
    </div>
  </div>
</div>

<script>

const overlay = document.getElementById("loadingOverlay");
function handleBtn(el){
  el.classList.remove("clicked"); void el.offsetWidth; el.classList.add("clicked");
  const url = el.dataset.url;
  overlay.classList.add("show");
  setTimeout(()=>{
    window.open(url,"_blank");
    setTimeout(()=>overlay.classList.remove("show"), 600);
  }, 2000);
}

</script>
</body>
</html>
